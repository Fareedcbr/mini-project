{% extends 'layout.html' %}

{% block content %}
    <div class="container">
        <h2>Manage Students</h2>

        <h3>Student List</h3>
        {% if students %}
            <table border="1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Course ID</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                        <tr>
                            <td>{{ student[0] }}</td>
                            <td>{{ student[1] }}</td>
                            <td>{{ student[2] }}</td>
                            <td>
                                <a href="{{ url_for('view_student', student_id=student[0]) }}">View</a> |
                                <a href="{{ url_for('delete_student', student_id=student[0]) }}">Delete</a>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        {% else %}
            <p>No students found.</p>
        {% endif %}
    </div>
{% endblock %}
