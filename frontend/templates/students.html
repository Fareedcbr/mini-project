<h1>Students</h1>
<a href="{{ url_for('add_student') }}">Add Student</a>
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Course</th>
    </tr>
    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[4] }}</td>
    </tr>
    {% endfor %}
</table>
