{% extends 'layout.html' %}

{% block content %}
    <div class="container">
        <h2>Update Submission</h2>
        <form action="{{ url_for('edit_upload', file_id=file_record[0]) }}" method="POST" enctype="multipart/form-data">
            <p><strong>Current file:</strong> {{ file_record[1] }}</p>
            <label for="file">Choose new file:</label>
            <input type="file" id="file" name="file" required><br><br>
            <button type="submit">Save</button>
        </form>
        <br>
        <a href="{{ url_for('upload') }}">Back to Upload Page</a>
    </div>
{% endblock %}
