{% extends 'layout.html' %}

{% block content %}
    <div class="container">
        <h2>Edit Assignment</h2>
        <form action="{{ url_for('edit_assignment', assignment_id=assignment[0]) }}" method="POST">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ assignment[1] }}" required><br><br>

            <label for="description">Description:</label>
            <textarea id="description" name="description" required>{{ assignment[2] }}</textarea><br><br>

            <label for="due_date">Due Date:</label>
            <input type="date" id="due_date" name="due_date" value="{{ assignment[3] }}" required><br><br>

            <label for="course_id">Course:</label>
            <select id="course_id" name="course_id" required>
                {% for course in courses %}
                    <option value="{{ course[0] }}" {% if course[0] == assignment[4] %}selected{% endif %}>{{ course[1] }} (ID: {{ course[0] }})</option>
                {% endfor %}
            </select><br><br>

            <button type="submit">Update Assignment</button>
        </form>
    </div>
{% endblock %}
