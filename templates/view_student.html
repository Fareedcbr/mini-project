{% extends 'layout.html' %}

{% block content %}
    <div class="container">
        <h2>Student Details</h2>
        {% if student %}
            <p><strong>Username:</strong> {{ student[0] }}</p>
            <p><strong>Course ID:</strong> {{ student[1] }}</p>
        {% else %}
            <p>Student not found.</p>
        {% endif %}
        <a href="{{ url_for('manage_students') }}">Back to Manage Students</a>
    </div>
{% endblock %}
