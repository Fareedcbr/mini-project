{% extends 'layout.html' %}

{% block content %}
    <div class="container">
        <h2>Register</h2>
        <form action="{{ url_for('register') }}" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>

            <label for="role">Register as:</label>
            <select id="role" name="role" required>
                <option value="student">Student</option>
                <option value="instructor">Instructor</option>
            </select><br><br>

            <label for="course_id" id="course_label" style="display: none;">Course:</label>
            <select id="course_id" name="course_id" style="display: none;">
                {% for course in courses %}
                    <option value="{{ course[0] }}">{{ course[1] }}</option>
                {% endfor %}
            </select><br><br>

            <button type="submit">Register</button>
        </form>

        <script>
            // Show course dropdown only for students
            document.getElementById('role').addEventListener('change', function () {
                const courseLabel = document.getElementById('course_label');
                const courseDropdown = document.getElementById('course_id');
                if (this.value === 'student') {
                    courseLabel.style.display = 'block';
                    courseDropdown.style.display = 'block';
                } else {
                    courseLabel.style.display = 'none';
                    courseDropdown.style.display = 'none';
                }
            });
        </script>

        <!-- Display flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flashes">
              {% for category, message in messages %}
                <li class="{{ category }}">{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
    </div>

{% endblock %}
